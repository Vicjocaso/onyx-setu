name: ci

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:

jobs:
  tui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: tui/go.sum

      - name: Vet & test
        working-directory: tui
        run: |
          go vet ./...
          go test ./...
          go build ./...
