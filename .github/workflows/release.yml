name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: tui/go.sum

      - name: Vet & test
        working-directory: tui
        run: |
          go vet ./...
          go test ./...

      - name: Build onyx-tui
        working-directory: tui
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="$(cat ../version)"
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "onyx-tui_linux_${{ matrix.arch }}" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: onyx-tui_linux_${{ matrix.arch }}
          path: tui/onyx-tui_linux_${{ matrix.arch }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tui/onyx-tui_linux_${{ matrix.arch }}
